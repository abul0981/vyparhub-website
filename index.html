<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />

    <title>VyparHub | India's B2B Marketplace for FMCG & Fashion Retailers</title>

    <meta
      name="description"
      content="VyparHub is India's AI-powered B2B marketplace connecting manufacturers with retailers across Tier 2, Tier 3, Tier 4 cities and villages. Discover trending FMCG & Fashion products, source directly from verified manufacturers, and grow your retail business."
    />

    <meta
      name="keywords"
      content="VyparHub, VyaparHub, B2B Marketplace India, FMCG Wholesale, Fashion Wholesale, Kirana App, Retail Marketplace, Manufacturer to Retailer, AI Retail Platform, Wholesale Platform India, FMCG Distributor, Fashion Distributor"
    />

    <meta name="author" content="VyparHub Technologies" />
    <meta name="robots" content="index, follow, max-image-preview:large" />

    <link rel="canonical" href="https://vyparhub.com/" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vyparhub-logo.svg" />
    <link rel="apple-touch-icon" href="/vyparhub-logo.svg" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VyparHub" />
    <meta property="og:url" content="https://vyparhub.com/" />
    <meta
      property="og:title"
      content="VyparHub | India's B2B Marketplace for FMCG & Fashion"
    />
    <meta
      property="og:description"
      content="Discover trending products, connect directly with verified manufacturers, and grow your retail business with AI-powered market insights."
    />
    <meta
      property="og:image"
      content="https://vyparhub.com/vyparhub-logo.svg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="VyparHub | India's B2B Marketplace"
    />
    <meta
      name="twitter:description"
      content="India's AI-powered B2B marketplace connecting manufacturers and retailers."
    />
    <meta
      name="twitter:image"
      content="https://vyparhub.com/vyparhub-logo.svg"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Schema.org JSON-LD -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "VyparHub",
        "url": "https://vyparhub.com",
        "logo": "https://vyparhub.com/vyparhub-logo.svg",
        "description": "India's AI-powered B2B marketplace connecting manufacturers with retailers across Tier 2, Tier 3, Tier 4 cities and villages.",
        "founder": {
          "@type": "Person",
          "name": "Khalid Hasan"
        },
        "sameAs": [
          "https://www.linkedin.com/company/vyparhub"
        ]
      }
    </script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "VyparHub",
        "url": "https://vyparhub.com",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://vyparhub.com/?q={search_term_string}",
          "query-input": "required name=search_term_string"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
